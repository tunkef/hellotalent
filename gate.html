<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hellotalent.ai</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Plus Jakarta Sans',sans-serif;
    background:#1E2D5E;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:16px;
    position:relative;
    overflow:hidden;
  }
  /* Arka plan doku */
  body::before{
    content:'';
    position:absolute;
    inset:0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(201,78,40,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 80% 80%, rgba(255,255,255,0.04) 0%, transparent 60%);
  }
  body::after{
    content:'✦';
    position:absolute;
    font-size:400px;
    color:rgba(255,255,255,0.025);
    right:-80px;
    bottom:-80px;
    line-height:1;
    pointer-events:none;
  }
  .card{
    background:white;
    border-radius:20px;
    padding:40px 36px;
    width:100%;
    max-width:380px;
    position:relative;
    z-index:1;
    box-shadow:0 24px 80px rgba(0,0,0,0.3);
  }
  .logo{
    font-family:'Bricolage Grotesque',sans-serif;
    font-weight:800;
    font-size:22px;
    color:#1E2D5E;
    margin-bottom:6px;
  }
  .logo span{color:#C94E28;}
  .subtitle{
    font-size:13px;
    color:#6B7280;
    margin-bottom:32px;
    line-height:1.5;
  }
  .field{margin-bottom:16px;}
  .field label{
    display:block;
    font-size:11px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.6px;
    color:#6B7280;
    margin-bottom:6px;
  }
  .field input{
    width:100%;
    padding:12px 14px;
    border:1.5px solid #E5E3DF;
    border-radius:10px;
    font-family:'Plus Jakarta Sans',sans-serif;
    font-size:14px;
    color:#111;
    outline:none;
    transition:border-color 0.2s;
  }
  .field input:focus{border-color:#1E2D5E;}
  .btn{
    width:100%;
    padding:14px;
    background:#C94E28;
    border:none;
    border-radius:10px;
    color:white;
    font-family:'Plus Jakarta Sans',sans-serif;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    transition:all 0.2s;
    margin-top:8px;
  }
  .btn:hover{background:#b84420;transform:translateY(-1px);}
  .btn:active{transform:translateY(0);}
  .error{
    display:none;
    background:#FEF2F2;
    border:1px solid #FECACA;
    color:#DC2626;
    padding:10px 14px;
    border-radius:8px;
    font-size:13px;
    margin-top:12px;
    text-align:center;
    font-weight:600;
  }
  .error.show{display:block;}
  .footer-note{
    margin-top:20px;
    font-size:11px;
    color:#9CA3AF;
    text-align:center;
  }
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-6px);}
    40%{transform:translateX(6px);}
    60%{transform:translateX(-4px);}
    80%{transform:translateX(4px);}
  }
  .shake{animation:shake 0.4s ease;}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="logo">hello<span>talent</span>.ai</div>
  <p class="subtitle">Bu alan geliştirme aşamasındadır.<br>Devam etmek için giriş yapınız.</p>

  <div class="field">
    <label>Kullanıcı Adı</label>
    <input type="text" id="username" placeholder="kullanıcı adı" autocomplete="username" onkeydown="if(event.key==='Enter')tryLogin()">
  </div>
  <div class="field">
    <label>Şifre</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')tryLogin()">
  </div>

  <button class="btn" onclick="tryLogin()">Giriş Yap →</button>
  <div class="error" id="error-msg">Kullanıcı adı veya şifre hatalı.</div>
  <p class="footer-note">Yetkisiz erişim yasaktır.</p>
</div>

<script>
  // Zaten giriş yapılmışsa direkt geç
  if (sessionStorage.getItem('ht_gate') === 'ok') {
    window.location.replace('index.html');
  }

  // Kimlik bilgileri — deploy öncesi değiştir
  const CREDENTIALS = {
    'hellotalent': 'ht2026dev'
  };

  function tryLogin() {
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value;

    if (CREDENTIALS[user] && CREDENTIALS[user] === pass) {
      sessionStorage.setItem('ht_gate', 'ok');
      document.querySelector('.btn').textContent = '✓ Yönlendiriliyor...';
      setTimeout(() => window.location.replace('index.html'), 400);
    } else {
      const errEl = document.getElementById('error-msg');
      const card = document.getElementById('card');
      errEl.classList.add('show');
      card.classList.add('shake');
      setTimeout(() => card.classList.remove('shake'), 400);
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  }

  document.getElementById('username').focus();
</script>
</body>
</html>
